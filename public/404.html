<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 / signal lost</title>
  <meta name="description" content="error diffusion crash page">
  <style>
    :root {
      color-scheme: dark;
      --fg: #f2f2f2;
      --line: rgba(255, 255, 255, 0.22);
      --cyan: #8cf4ff;
      --magenta: #ff47ca;
      --lime: #b9ff7a;
      --bg: #040404;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--fg); }
    body {
      overflow: hidden;
      font-family: "Audiowide", "Segoe UI", Tahoma, sans-serif;
    }

    .crt {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(24,24,24,0.8), #000 70%);
      transform-origin: center center;
      animation: crt-twist 18s ease-in-out infinite alternate;
    }

    .scan {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(to bottom, rgba(255,255,255,0.05), rgba(255,255,255,0.02) 1px, transparent 1px, transparent 4px);
      background-size: 100% 4px;
      mix-blend-mode: screen;
      opacity: 0.22;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.1;
      background-image: radial-gradient(circle, rgba(255,255,255,0.35) 0.8px, transparent 0.8px);
      background-size: 6px 6px;
      animation: noise-shift 0.16s steps(2) infinite;
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      box-shadow: inset 0 0 140px rgba(0, 0, 0, 0.9);
    }

    .wrap {
      position: relative;
      z-index: 2;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 1.2rem;
    }

    .panel {
      width: min(780px, calc(100vw - 2rem));
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(7, 7, 7, 0.72);
      backdrop-filter: blur(5px);
      padding: clamp(1rem, 3vw, 2rem);
      transform: perspective(1000px) rotateX(1.8deg);
      animation: power-flicker 2.8s steps(2) infinite;
    }

    .code {
      margin: 0;
      font-size: clamp(2.8rem, 15vw, 8rem);
      line-height: 0.9;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: #fff;
      text-shadow: 4px 4px 0 #f00, -4px 4px 0 #0f0, 4px -4px 0 #00f;
      animation: rgb-jitter 700ms ease-in-out infinite alternate;
    }

    .msg {
      margin: 0.8rem 0 0;
      font-family: Consolas, "Courier New", monospace;
      line-height: 1.6;
      color: rgba(218, 221, 230, 0.9);
    }

    .chips {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.3rem 0.62rem;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.75rem;
      background: rgba(255,255,255,0.03);
      color: rgba(236, 236, 236, 0.9);
    }
    .chip.cyan { color: var(--cyan); border-color: rgba(140,244,255,0.35); }
    .chip.magenta { color: var(--magenta); border-color: rgba(255,71,202,0.35); }
    .chip.lime { color: var(--lime); border-color: rgba(185,255,122,0.35); }

    .links {
      margin-top: 1.1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }
    .links a {
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.48rem 0.9rem;
      color: var(--fg);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.03);
    }

    @keyframes rgb-jitter {
      0% { transform: translate(0,0); text-shadow: 9px 2px 0 #f00, -3px 3px 0 #0f0, 3px -3px 0 #00f; }
      50% { transform: translate(1px,-1px); text-shadow: 4px 2px 0 #0f0, -3px 8px 0 #00f, 10px -2px 0 #f00; }
      100% { transform: translate(-1px,1px); text-shadow: 3px 3px 0 #00f, -3px 3px 0 #f00, 3px -3px 0 #0f0; }
    }

    @keyframes crt-twist {
      0% { transform: scale(1) rotateZ(-0.35deg); }
      50% { transform: scale(1.012) rotateZ(0.25deg); }
      100% { transform: scale(0.996) rotateZ(-0.18deg); }
    }

    @keyframes power-flicker {
      0%, 100% { opacity: 1; }
      10% { opacity: 0.95; }
      20% { opacity: 0.88; }
      30% { opacity: 1; }
      65% { opacity: 0.92; }
      78% { opacity: 1; }
    }

    @keyframes noise-shift {
      0% { transform: translate(0,0); }
      100% { transform: translate(1px,-1px); }
    }
  </style>
</head>
<body>
  <div class="crt" aria-hidden="true"></div>
  <div class="scan" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <main class="wrap">
    <section class="panel">
      <h1 class="code">404</h1>
      <p class="msg">signal lost / patch route missing / crash page online</p>
      <p class="msg">jit.net.recv timed out on this path. return to root and re-enter the transport graph.</p>
      <div class="chips" aria-label="max patch terms">
        <span class="chip cyan">p audiostuff</span>
        <span class="chip cyan">p granular</span>
        <span class="chip">route connected</span>
        <span class="chip">record-curtis</span>
        <span class="chip lime">metro 4n @active 1</span>
        <span class="chip">transport @tempo 90</span>
        <span class="chip magenta">jit.release~</span>
        <span class="chip">buffer~ curtis</span>
      </div>
      <div class="links">
        <a href="/">go home</a>
        <a href="https://github.com/aday1/error-diffusion">github source</a>
      </div>
    </section>
  </main>
</body>
</html>

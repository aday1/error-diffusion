<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>𝖊𝖗𝖗𝖔𝖗 𝖉𝖎𝖋𝖋𝖚𝖘𝖎𝖔𝖓</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      color: #eaeaea;
      font-family: "Audiowide", "Segoe UI", Tahoma, sans-serif;
      overflow: hidden;
    }
    #container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: grid;
      place-items: center;
      pointer-events: none;
      text-align: center;
      padding: 1rem;
    }
    .title {
      margin: 0;
      line-height: 1;
      font-size: clamp(2.25rem, 10vw, 7.5rem);
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 3px 3px 0 #f00, -3px 3px 0 #0f0, 3px -3px 0 #00f;
      animation: rgb-glitch 550ms ease-in-out infinite alternate;
      text-transform: lowercase;
    }
    .dns {
      position: fixed;
      left: 50%;
      bottom: 1rem;
      transform: translateX(-50%);
      z-index: 2;
      width: min(980px, calc(100vw - 2rem));
      background: rgba(0, 0, 0, 0.66);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      font-family: Consolas, "Courier New", monospace;
      color: #f5f5f5;
      backdrop-filter: blur(3px);
    }
    .dns p {
      margin: 0 0 0.45rem 0;
      font-size: 0.93rem;
    }
    .dns ul {
      margin: 0;
      padding-left: 1.25rem;
      font-size: 0.93rem;
      line-height: 1.35;
    }
    .dns code {
      color: #9ff;
    }
    .links {
      margin-top: 0.45rem;
      font-size: 0.85rem;
    }
    .links a {
      color: #9ff;
      text-decoration: none;
    }
    .patch-shot {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 2;
      width: min(380px, 35vw);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(2px);
    }
    .patch-shot img {
      display: block;
      width: 100%;
      height: auto;
    }
    @keyframes rgb-glitch {
      0% { text-shadow: 10px 3px 0 #f00, -3px 3px 0 #0f0, 3px -3px 0 #00f; }
      20% { text-shadow: 13px 3px 0 #0f0, -3px 3px 0 #00f, 3px -3px 0 #f00; }
      60% { text-shadow: 4px 2px 0 #0f0, -3px 3px 0 #00f, 3px -3px 0 #f00; }
      90% { text-shadow: 3px 3px 0 #00f, -3px 3px 0 #f00, 3px -3px 0 #0f0; }
      92% { text-shadow: none; }
      100% { text-shadow: 3px 3px 0 #f00, -3px 3px 0 #0f0, 3px -3px 0 #00f; }
    }
  </style>
</head>
<body>
  <div id="container" aria-hidden="true"></div>
  <div class="overlay">
    <h1 class="title">𝖊𝖗𝖗𝖔𝖗 𝖉𝖎𝖋𝖋𝖚𝖘𝖎𝖔𝖓</h1>
  </div>
  <aside class="dns">
    <p>Registrar nameservers required:</p>
    <ul>
      <li><code>darl.ns.cloudflare.com</code></li>
      <li><code>elisabeth.ns.cloudflare.com</code></li>
    </ul>
    <p class="links">
      Backup: <a href="https://aday1.github.io/error-diffusion/">aday1.github.io/error-diffusion</a>
    </p>
  </aside>
  <figure class="patch-shot">
    <img src="/assets/max-patch-1.png" alt="Max patch screenshot">
  </figure>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/89/three.min.js"></script>
  <script id="vertexShader" type="x-shader/x-vertex">
    void main() {
      gl_Position = vec4(position, 1.0);
    }
  </script>
  <script id="fragmentShader" type="x-shader/x-fragment">
    #ifdef GL_ES
    precision mediump float;
    #endif
    #extension GL_OES_standard_derivatives : enable

    uniform float time;
    uniform vec2 resolution;

    void main(void) {
      vec2 fMosaicScal = vec2(1.4, 2.0);
      vec2 vScreenSize = vec2(resolution.x, resolution.y);
      vec4 o = gl_FragColor;
      vec3 u = normalize(vec3(2.0 * gl_FragCoord.xy - resolution.xy, resolution.xy.x)) * 0.9;

      u.x = floor(u.x * vScreenSize.x / fMosaicScal.x) / (vScreenSize.x / fMosaicScal.x);
      u.y = floor(u.y * vScreenSize.y / fMosaicScal.y) / (vScreenSize.y / fMosaicScal.y);
      u.z = floor(u.z * vScreenSize.y / fMosaicScal.y) / (vScreenSize.y / fMosaicScal.y);

      for (float i = 0.0; i < 2.0; i++) {
        u.y += abs(cos(u.y * i * 2.1) * 0.1);
        u.z += abs(cos(u.x * u.y - time * 0.01));
        u += abs(cos(u * i * 0.1) * 0.1);
        o = max(o, abs(cos(3.0 * dot(u, u) + vec4(0.0, 0.0, 0.0, 0.0))));
      }
      gl_FragColor = o;
    }
  </script>
  <script>
    var container = document.getElementById("container");
    var camera = new THREE.Camera();
    var scene = new THREE.Scene();
    var renderer = new THREE.WebGLRenderer();
    var uniforms = {
      time: { type: "f", value: 3.0 },
      resolution: { type: "v2", value: new THREE.Vector2() }
    };

    camera.position.z = 2;

    var geometry = new THREE.PlaneBufferGeometry(4, 2);
    var material = new THREE.ShaderMaterial({
      uniforms: uniforms,
      vertexShader: document.getElementById("vertexShader").textContent,
      fragmentShader: document.getElementById("fragmentShader").textContent
    });
    var mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    function onWindowResize() {
      renderer.setSize(window.innerWidth, window.innerHeight);
      uniforms.resolution.value.x = renderer.domElement.width;
      uniforms.resolution.value.y = renderer.domElement.height;
    }

    function render() {
      uniforms.time.value += 0.01;
      renderer.render(scene, camera);
      requestAnimationFrame(render);
    }

    window.addEventListener("resize", onWindowResize, false);
    onWindowResize();
    render();
  </script>
</body>
</html>
